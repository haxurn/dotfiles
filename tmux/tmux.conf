# ~/.config/tmux/tmux.conf or ~/.tmux.conf
# Set default shell to zsh (fixes tmux starting bash)
set -g default-shell /usr/bin/zsh
set -g default-command /usr/bin/zsh
# Terminal & colors (works on macOS, Linux, Alacritty, Kitty, iTerm2, Warp, etc.)
set -g default-terminal "tmux-256color"
# True color + RGB support for Warp and modern terminals
set -ag terminal-overrides ",xterm-256color:RGB,*256col*:Tc,xterm*:XT"
set -ag terminal-overrides ",screen-256color:Tc"
set -ag terminal-overrides "*256col*:Cr"
# Focus events for better rendering in modern terminals + vim/neovim
set -g focus-events on

# General behavior
set -g escape-time 0
set -g history-limit 1000000
set -g mouse on
set -g set-clipboard on
set -g detach-on-destroy off
set -g status-interval 3
set -g allow-passthrough on
set -g status-position bottom

# Prefix: Ctrl-a instead of Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix                  # Press Ctrl-a twice to send literal Ctrl-a

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Better splits + stay in current path
unbind %
unbind-key '\'
bind-key '\' split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -vc "#{pane_current_path}"

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation & resizing
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# Toggle zoom (maximize/minimize pane)
bind -r m resize-pane -Z

# Copy mode - vi keys + cross-platform clipboard (works in Warp, macOS, Linux)
set-window-option -g mode-keys vi
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy || xclip -in -selection clipboard || pbcopy"

# Quick kill pane without confirmation
bind q kill-pane

# Start numbering at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# ------------------ Plugins (TPM) ------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'hendrikmi/tmux-cpu-mem-monitor'

# Resurrect/Continuum settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'           # Auto-restore last session on tmux start
set -g @continuum-save-interval '15'   # Save every 15 min

# ------------------ Styling ------------------
# Colors (Nord-inspired)
gray_light="#D8DEE9"
gray_medium="#ABB2BF"
gray_dark="#3B4252"
green_soft="#A3BE8C"
blue_muted="#81A1C1"
cyan_soft="#88C0D0"
purple="#B48EAD"

set -g status-left-length 100
set -g status-style "fg=${gray_light},bg=default"
set -g status-left "#[fg=${green_soft},bold] #S #[fg=${gray_light}]| "
set -g status-right "#[fg=${cyan_soft}]#{cpu} #[fg=${purple}]#{mem} #[fg=${gray_medium}]%H:%M "

set -g window-status-current-format "#[fg=${cyan_soft},bold]#I:#W#{?window_zoomed_flag, 󰊓 , }"
set -g window-status-format "#[fg=${gray_medium}]#I:#W"

set -g message-style "fg=${gray_light},bg=default"
set -g mode-style "fg=${gray_dark},bg=${blue_muted}"
set -g pane-border-style "fg=${gray_dark}"
set -g pane-active-border-style "fg=${green_soft}"

# Initialize TPM (always keep this at the very bottom!)
run '~/.tmux/plugins/tpm/tpm'
